<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Сторінка контактів. Форма для зворотного зв'язку.">
  <title>Контакти</title>
  <script src="../app.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <a href="../index.html">Головна</a>
      <a href="about.html">Про мене</a>
      <a href="contact.html">Контакти</a>
    </nav>
  </header>
  <main>
    <h1>Контактна форма</h1>
    <form action="./submit.html" method="get">
      <h2>Зв’яжіться зі мною</h2>
      <p>
        <label for="name">Ім’я (обов’язково):</label>
        <input id="name" name="name" type="text" required minlength="2" maxlength="30">
      </p>
      <p>
        <label for="email">Email (обов’язково):</label>
        <input id="email" name="email" type="email" required>
      </p>
      <p>
        <label for="phone">Телефон:</label>
        <input id="phone" name="phone" type="tel" pattern="\+?\d{10,15}">
      </p>
      <p>
        <label for="topic">Тема:</label>
        <select id="topic" name="topic">
          <option value="study">Навчання</option>
          <option value="work">Співпраця</option>
          <option value="other">Інше</option>
        </select>
      </p>
      <fieldset>
        <legend>Зручний спосіб зв’язку</legend>
        <label><input type="radio" name="contactWay" value="email" checked> Email</label>
        <label><input type="radio" name="contactWay" value="phone"> Телефон</label>
      </fieldset>
      <p>
        <label for="message">Повідомлення:</label><br>
        <textarea id="message" name="message" rows="5" cols="30"></textarea>
      </p>
      <p>
        <label>
          <input type="checkbox" name="agree" required>
          Погоджуюсь з правилами
        </label>
      </p>
      <button type="submit">Надіслати</button>
      <button type="reset">Очистити</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2026 Дiдик Богдан</p>
  </footer>
</body>
</html>
